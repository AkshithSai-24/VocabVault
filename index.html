<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons & App Icons -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <meta name="msapplication-TileImage" content="/logo.svg" />
    <meta name="msapplication-TileColor" content="#0e0e11" />
    <meta name="theme-color" content="#0e0e11" />

    <!-- Viewport — prevents zoom quirks on mobile/tablet/TV -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>VocabVault — Your Personal Lexicon</title>
    <meta name="description" content="Look up any word. Get AI-powered definitions, examples, and synonyms. Save your favorites to build a personal vocabulary library." />

    <!-- Open Graph (social sharing previews) -->
    <meta property="og:title" content="VocabVault — Your Personal Lexicon" />
    <meta property="og:description" content="AI-powered vocabulary builder. Look up words, save definitions, build your lexicon." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.svg" />

    <!-- PWA / mobile web app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VocabVault" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
